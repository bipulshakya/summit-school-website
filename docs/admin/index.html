<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Summit School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

        body {
            min-height:100vh;
            background:#060612;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }

        /* Glowing background orbs */
        .orb {
            position:absolute;
            border-radius:50%;
            filter:blur(80px);
            pointer-events:none;
        }
        .orb1 { width:500px;height:500px;background:rgba(99,102,241,0.15);top:-150px;left:-150px;animation:drift 8s ease-in-out infinite; }
        .orb2 { width:400px;height:400px;background:rgba(236,72,153,0.1);bottom:-100px;right:-100px;animation:drift 10s ease-in-out infinite reverse; }
        @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }

        .card {
            width:420px;
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:22px;
            padding:46px 38px;
            position:relative;
            z-index:10;
            backdrop-filter:blur(20px);
            box-shadow:0 40px 80px rgba(0,0,0,0.6);
        }

        .brand {
            text-align:center;
            margin-bottom:32px;
        }
        .brand-icon {
            width:68px;height:68px;
            background:linear-gradient(135deg,#6366f1,#ec4899);
            border-radius:18px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.8rem;margin:0 auto 14px;
            box-shadow:0 10px 28px rgba(99,102,241,0.4);
        }
        .brand h1 { font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:4px; }
        .brand p { color:rgba(255,255,255,0.35);font-size:0.82rem; }

        .hint {
            display:flex;align-items:center;gap:8px;
            background:rgba(99,102,241,0.07);
            border:1px solid rgba(99,102,241,0.15);
            border-radius:10px;padding:10px 14px;
            margin-bottom:22px;color:rgba(255,255,255,0.4);font-size:0.78rem;
        }

        .field { margin-bottom:18px; }
        .field label { display:block;color:rgba(255,255,255,0.5);font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px; }
        .input-wrap { position:relative; }
        .input-wrap .ico { position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;color:rgba(255,255,255,0.25); }
        .field input {
            width:100%;padding:12px 14px 12px 40px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:11px;color:#fff;
            font-size:0.9rem;font-family:'Inter',sans-serif;
            outline:none;transition:border-color 0.25s,background 0.25s;
        }
        .field input:focus { border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.05); }

        .login-btn {
            width:100%;padding:13px;
            background:linear-gradient(135deg,#6366f1,#ec4899);
            border:none;border-radius:11px;color:#fff;
            font-size:0.95rem;font-weight:600;cursor:pointer;
            transition:transform 0.25s,box-shadow 0.25s;
            font-family:'Inter',sans-serif;margin-top:4px;
        }
        .login-btn:hover { transform:translateY(-2px);box-shadow:0 10px 28px rgba(99,102,241,0.45); }
        .login-btn:active { transform:translateY(0); }

        .error {
            color:#f87171;font-size:0.83rem;text-align:center;
            margin-top:14px;padding:10px;
            background:rgba(239,68,68,0.08);border-radius:8px;
            border:1px solid rgba(239,68,68,0.15);
            display:none;
        }

        .back { text-align:center;margin-top:22px; }
        .back a { color:rgba(255,255,255,0.25);font-size:0.82rem;text-decoration:none;transition:color 0.2s; }
        .back a:hover { color:rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="card">
        <div class="brand">
            <div class="brand-icon">🏫</div>
            <h1>Admin Portal</h1>
            <p>Summit English Boarding School</p>
        </div>

        <div class="hint">💡 Default: admin / summit2025</div>

        <form id="loginForm" autocomplete="off">
            <div class="field">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="ico">👤</span>
                    <input type="text" id="uname" placeholder="Enter username" autofocus>
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="ico">🔒</span>
                    <input type="password" id="pword" placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="login-btn">🚀 Sign In to Dashboard</button>
            <div class="error" id="err">❌ Invalid username or password</div>
        </form>

        <div class="back"><a href="../index.html">← Back to school website</a></div>
    </div>

    <script>
        // Use localStorage for auth (sessionStorage fails on file:// in some browsers)
        // Check if already logged in
        if (localStorage.getItem('summit_admin_auth') === 'yes') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var u = document.getElementById('uname').value.trim();
            var p = document.getElementById('pword').value;
            var storedU = localStorage.getItem('summit_admin_user') || 'admin';
            var storedP = localStorage.getItem('summit_admin_pass') || 'summit2025';

            if (u === storedU && p === storedP) {
                localStorage.setItem('summit_admin_auth', 'yes');
                window.location.href = 'dashboard.html';
            } else {
                var err = document.getElementById('err');
                err.style.display = 'block';
                document.getElementById('pword').value = '';
                document.getElementById('pword').focus();
                setTimeout(function(){ err.style.display = 'none'; }, 4000);
            }
        });
    </script>
</body>
</html>
