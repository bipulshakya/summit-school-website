    <style>
        /* ---- Page-specific styles ---- */
        .page-hero {
            width: 100%;
            min-height: 320px;
            background: linear-gradient(135deg, #060612 0%, #1a0533 50%, #0a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 60px 40px 40px;
            position: relative;
            overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            top: -150px; left: -100px;
        }
        .page-hero::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
            bottom: -100px; right: 0;
        }
        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            color: #fff;
            position: relative;
            z-index: 1;
            margin-bottom: 10px;
        }
        .page-hero p {
            color: rgba(255,255,255,0.55);
            font-size: 1.05rem;
            position: relative;
            z-index: 1;
        }

        /* Notice Section */
        .notice-section {
            background: #0a0a18;
            min-height: 60vh;
            padding: 50px 80px 80px;
        }
        .notice-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 7px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border-color: transparent;
            color: #fff;
        }
        .notices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }
        .notice-card {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 22px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .notice-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #ec4899);
        }
        .notice-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,0.25);
            box-shadow: 0 16px 36px rgba(0,0,0,0.4);
        }
        .notice-badge {
            display: inline-block;
            padding: 3px 11px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .badge-exam     { background: rgba(239,68,68,0.18);  color: #f87171; }
        .badge-holiday  { background: rgba(16,185,129,0.18); color: #34d399; }
        .badge-event    { background: rgba(245,158,11,0.18); color: #fbbf24; }
        .badge-general  { background: rgba(99,102,241,0.18); color: #a5b4fc; }
        .badge-important{ background: rgba(236,72,153,0.18); color: #f9a8d4; }
        .notice-card h3 {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .notice-card p {
            color: rgba(255,255,255,0.5);
            font-size: 0.87rem;
            line-height: 1.65;
        }
        .notice-date {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.25);
            font-size: 0.78rem;
            margin-top: 14px;
        }
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 60px 20px;
            grid-column: 1/-1;
        }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 12px; }

        /* Footer override */
        #footer { background: linear-gradient(to right, #0a0118, #0d1b3e); }
    </style>
</head>

    <script>
        const defaultNotices = [
            { id: 1, title: "Grade 10 Final Examination Schedule", category: "exam", date: "2026-03-20", description: "Final examinations for Grade 10 will commence from April 5, 2026. All students must collect their admit cards from the office by March 28." },
            { id: 2, title: "Holiday Notice — Holi Festival", category: "holiday", date: "2026-03-14", description: "School will remain closed on March 14, 2026 (Holi). Regular classes resume March 16, 2026." },
            { id: 3, title: "Annual Sports Day 2026", category: "event", date: "2026-03-10", description: "Annual Sports Day is scheduled for March 25, 2026. All students report by 7:00 AM in their house colours. Parents are warmly welcome." },
            { id: 4, title: "Parent-Teacher Meeting", category: "important", date: "2026-03-05", description: "PTM is scheduled for March 29, 2026 from 10 AM to 2 PM. Attendance of parents/guardians is mandatory." },
            { id: 5, title: "Library Books Return Reminder", category: "general", date: "2026-02-28", description: "All borrowed library books must be returned by March 31, 2026. Fine of Rs. 5/day after due date." },
            { id: 6, title: "Scholarship Exam Registration Open", category: "important", date: "2026-02-20", description: "Registration for the annual scholarship exam is open for Grade 5–9 students. Forms available at the school office. Last date: March 31." }
        ];

        let currentFilter = 'all';

        function getNotices() {
            try {
                const stored = localStorage.getItem('summit_notices');
                if (stored) {
                    const arr = JSON.parse(stored);
                    return arr.length > 0 ? arr : defaultNotices;
                }
            } catch(e) {}
            return defaultNotices;
        }

        function filterNotices(btn, category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNotices();
        }

        function renderNotices() {
            const notices = getNotices();
            const filtered = currentFilter === 'all' ? notices : notices.filter(n => n.category === currentFilter);
            const grid = document.getElementById('noticesGrid');
            if (!grid) return;
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><span>📋</span>No notices in this category yet.</div>';
                return;
            }
            grid.innerHTML = filtered.map(n => `
                <div class="notice-card">
                    <span class="notice-badge badge-${n.category}">${n.category}</span>
                    <h3>${n.title}</h3>
                    <p>${n.description}</p>
                    <div class="notice-date">📅 ${new Date(n.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
                </div>
            `).join('');
        }

        renderNotices();
    </script>
